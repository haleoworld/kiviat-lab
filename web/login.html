<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kiviat Lab — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0a0b; color:#e7e7ea; -webkit-font-smoothing:antialiased; }
    .card { background:#161618; border:1px solid #262629; border-radius:18px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-5">
  <div class="card w-full max-w-sm p-7">
    <h1 class="text-2xl font-bold tracking-tight">Kiviat&nbsp;Lab</h1>
    <p class="text-sm text-neutral-500 mt-1 mb-6">Enter your passcode to continue.</p>

    <div id="error" class="hidden mb-4 text-sm text-rose-400 bg-rose-500/10 border border-rose-500/30 rounded-lg px-3 py-2">
      Wrong passcode — try again.
    </div>

    <form method="POST" action="/login" class="space-y-4">
      <input type="password" name="passcode" inputmode="numeric" autocomplete="current-password"
             autofocus placeholder="Passcode"
             class="w-full bg-[#0f0f11] border border-[#2e2e32] rounded-xl px-4 py-3 text-lg
                    tracking-widest text-center outline-none focus:border-blue-500/60" />
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 transition
                     rounded-xl px-4 py-3 font-semibold">
        Sign in
      </button>
    </form>

    <p class="text-[11px] text-neutral-600 mt-6 text-center">Private — reachable only over your Tailscale network.</p>
  </div>

  <script>
    if (new URLSearchParams(location.search).has('error'))
      document.getElementById('error').classList.remove('hidden');
  </script>
</body>
</html>
